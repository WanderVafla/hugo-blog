name: Build du blog

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-hugo@v3
        with: {hugo-version: "0.128.0"}
      - run: hugo --minify

  qualite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint des articles Markdown
        run: npx markdownlint-cli2 "content/**/*.md"
        
      - name: Vérifier les liens morts
        uses: lycheeverse/lychee-action@v2
        with:
           args: --no-progress "content/**/*.md"
           failIfEmpty: false